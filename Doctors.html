<!-- DOCTORS -->
      <div class="page-view" id="page-doctors">

        <div class="section-header">
          <div>
            <div class="section-title" style="font-size:20px;">Doctors</div>
            <div class="section-sub" id="drSubtitle">Manage referring doctors</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <button class="btn btn-secondary btn-sm" onclick="dr_load()" id="drRefreshBtn">
              <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="drRefreshIcon">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
              Refresh
            </button>
            <button class="btn btn-primary btn-sm" onclick="dr_openModal()">
              <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
              </svg>
              Add Doctor
            </button>
          </div>
        </div>

        <!-- Search + filter -->
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
          <div style="position:relative;flex:1;min-width:200px;">
            <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-4);" width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
            <input type="text" id="drSearch" class="f-inp" style="padding-left:34px;font-size:13px;"
              placeholder="Search name, specialty, license…" oninput="dr_applyFilter()">
          </div>
        </div>

        <!-- Table -->
        <div class="card">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Specialty</th>
                  <th>License No.</th>
                  <th>Contact</th>
                  <th>Username</th>
                  <th>Assigned Branch(es)</th>
                  
                  <th style="text-align:center;">Actions</th>
                </tr>
              </thead>
              <tbody id="drTableBody"></tbody>
            </table>
          </div>
        </div>

      </div>

      <!-- ══ DOCTOR MODAL ══ -->
      <div id="drModal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(9,15,18,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;">
        <div style="background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalIn .22s cubic-bezier(.34,1.2,.64,1);">

          <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);">
            <div>
              <div style="font-size:16px;font-weight:800;color:var(--text-1);" id="drModalTitle">Add Doctor</div>
              <div style="font-size:12px;color:var(--text-3);margin-top:2px;font-family:var(--mono);" id="drModalSub">Fill in doctor details</div>
            </div>
            <button onclick="dr_closeModal()" style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-3);">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>

          <div style="padding:24px;">
            <input type="hidden" id="drModalId">

            <!-- Name fields -->
            <div style="margin-bottom:14px;">
              <label class="f-label">Full Name <span style="color:var(--danger);">*</span></label>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;">
                <input type="text" id="drFldLast"   class="f-inp" placeholder="Last name">
                <input type="text" id="drFldFirst"  class="f-inp" placeholder="First name">
                <input type="text" id="drFldMiddle" class="f-inp" placeholder="Middle name">
                <input type="text" id="drFldSuffix" class="f-inp" placeholder="Jr." style="width:56px;">
              </div>
              <div style="font-size:10px;color:var(--text-4);margin-top:4px;font-family:var(--mono);">Last · First · Middle · Suffix</div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">

              <div>
                <label class="f-label">Specialty</label>
                <input type="text" id="drFldSpecialty" class="f-inp" placeholder="e.g. Pathology">
              </div>

              <div>
                <label class="f-label">License No.</label>
                <input type="text" id="drFldLicense" class="f-inp" placeholder="e.g. 0012345" style="font-family:var(--mono);">
              </div>

              <div>
                <label class="f-label">Contact</label>
                <input type="tel" id="drFldContact" class="f-inp" placeholder="09XX XXX XXXX" maxlength="13" style="font-family:var(--mono);" oninput="_phoneInput(this)">
                <div class="ph-hint" style="font-size:11px;margin-top:3px;font-family:var(--mono);"></div>
              </div>

              <div>
                <label class="f-label">Email</label>
                <input type="email" id="drFldEmail" class="f-inp" placeholder="e.g. doctor@alab.com">
              </div>

              <div>
                <label class="f-label">Username <span style="color:var(--danger);">*</span></label>
                <input type="text" id="drFldUser" class="f-inp" placeholder="e.g. dr.smith" style="font-family:var(--mono);">
              </div>

              <div>
                <label class="f-label">Password <span style="color:var(--danger);" id="drPassReqMark">*</span></label>
                <input type="password" id="drFldPass" class="f-inp" placeholder="Set password" autocomplete="new-password">
                <div style="font-size:10px;color:var(--text-4);margin-top:4px;" id="drPassHint"></div>
              </div>

              <!-- Branch assignment -->
              <div style="grid-column:1/-1;">
                <label class="f-label">Assign Branch(es) <span style="color:var(--danger);">*</span></label>
                <div style="border:1.5px solid var(--border);border-radius:var(--radius);max-height:160px;overflow-y:auto;background:var(--gray-50);" id="drBranchList">
                  <div style="padding:12px;text-align:center;font-size:12px;color:var(--text-4);font-family:var(--mono);">Loading branches…</div>
                </div>
                <div style="font-size:11px;color:var(--text-3);margin-top:5px;font-family:var(--mono);" id="drBranchCount">0 branches selected</div>
              </div>

            </div>
            <div id="drModalErr" style="display:none;margin-top:14px;font-size:12px;color:var(--danger);background:var(--danger-bg);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:9px 12px;"></div>
          </div>

          <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
            <button class="btn btn-secondary" onclick="dr_closeModal()">Cancel</button>
            <button class="btn btn-primary" id="drSaveBtn" onclick="dr_save()">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              Save Doctor
            </button>
          </div>
        </div>
      </div>

      <!-- ══ DELETE CONFIRM ══ -->
      <div id="drDeleteModal" style="display:none;position:fixed;inset:0;z-index:501;background:rgba(9,15,18,.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:20px;">
        <div style="background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:440px;box-shadow:var(--shadow-xl);padding:28px 24px;animation:slideup .22s ease;">
          <div style="display:flex;gap:14px;margin-bottom:20px;align-items:flex-start;">
            <div style="width:42px;height:42px;border-radius:50%;background:var(--danger-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="18" height="18" fill="none" stroke="var(--danger)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </div>
            <div>
              <div style="font-size:16px;font-weight:800;color:var(--text-1);margin-bottom:4px;">Remove Doctor?</div>
              <div style="font-size:13px;color:var(--text-2);line-height:1.6;" id="drDeleteMsg">This cannot be undone.</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button class="btn btn-danger" style="width:100%;justify-content:center;padding:13px;" onclick="dr_confirmDelete()">Yes, Remove Doctor</button>
            <button class="btn btn-secondary" style="width:100%;justify-content:center;padding:13px;" onclick="dr_closeDeleteModal()">Cancel</button>
          </div>
        </div>
      </div>

<script>
/* ════════════════════════════════════
   DOCTORS MODULE
════════════════════════════════════ */
var DR = {
  all:       [],
  filtered:  [],
  branches:  [],
  editingId: null
};
var _drDeleteId = null;

/* ── Skeleton ── */
function dr_skeleton() {
  var row = '<tr>';
  for (var i = 0; i < 8; i++)
    row += '<td><div style="height:13px;border-radius:6px;background:linear-gradient(90deg,#f0f2f7 25%,#e4e8f0 50%,#f0f2f7 75%);background-size:400px 100%;animation:shimmer 1.3s infinite;"></div></td>';
  return row + '</tr>' + row + row + row;
}

/* ── Load ── */
function dr_load() {
  var branchIds = APP.user && APP.user.role !== 'Super Admin'
    ? (APP.user.branch_ids || '') : '';

  DR.all      = [];
  DR.filtered = [];
  var icon = document.getElementById('drRefreshIcon');
  if (icon) icon.style.animation = 'spin .8s linear infinite';
  document.getElementById('drSubtitle').textContent = 'Loading…';
  document.getElementById('drTableBody').innerHTML  = dr_skeleton();

  google.script.run
    .withSuccessHandler(function(r) {
      if (icon) icon.style.animation = '';
      if (!r.success) {
        document.getElementById('drSubtitle').textContent = 'Failed to load';
        document.getElementById('drTableBody').innerHTML =
          '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--danger);font-size:13px;">'
          + (r.message || 'Failed to load doctors.')
          + ' <a href="javascript:void(0)" onclick="dr_load()" style="color:var(--teal-600);font-weight:700;">Retry</a></td></tr>';
        return;
      }
      DR.all      = r.data     || [];
      DR.branches = r.branches || [];
      dr_applyFilter();
    })
    .withFailureHandler(function(e) {
      if (icon) icon.style.animation = '';
      document.getElementById('drSubtitle').textContent = 'Error';
      document.getElementById('drTableBody').innerHTML =
        '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--danger);font-size:13px;">'
        + _e(e.message || 'Connection error.')
        + ' <a href="javascript:void(0)" onclick="dr_load()" style="color:var(--teal-600);font-weight:700;">Retry</a></td></tr>';
    })
    .getDoctors(branchIds);
}

/* ── Filter + Render ── */
function dr_applyFilter() {
  var q  = (document.getElementById('drSearch').value || '').trim().toLowerCase();
  DR.filtered = DR.all.filter(function(d) {
    if (q) {
      var hay = [d.last_name, d.first_name, d.middle_name, d.specialty, d.license_no, d.username, d.branches_display].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  dr_render();
}

function dr_render() {
  var count = DR.filtered.length;
  document.getElementById('drSubtitle').textContent =
    count + ' doctor' + (count !== 1 ? 's' : '') +
    (count !== DR.all.length ? ' (filtered from ' + DR.all.length + ')' : ' total');

  if (!count) {
    document.getElementById('drTableBody').innerHTML =
      '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-4);font-family:var(--mono);font-size:13px;">No doctors found.</td></tr>';
    return;
  }

  var h = '';
  DR.filtered.forEach(function(d) {
    var fullName  = 'Dr. ' + _e(d.last_name) + ', ' + _e(d.first_name)
      + (d.middle_name ? ' ' + _e(d.middle_name.charAt(0)) + '.' : '')
      + (d.suffix      ? ' ' + _e(d.suffix) : '');

    h += '<tr id="dr-row-' + _e(d.doctor_id) + '" style="cursor:pointer;" onclick="dr_openProfile(\'' + _e(d.doctor_id) + '\')">'
      + '<td>'
        + '<div style="display:flex;align-items:center;gap:10px;">'
          + _avatar(d.photo_url, d.last_name + ' ' + d.first_name, 32)
          + '<div>'
            + '<div style="font-weight:700;color:var(--text-1);font-size:13px;">' + fullName + '</div>'
            + '<div style="font-size:10px;color:var(--text-4);font-family:var(--mono);margin-top:1px;">' + _e(d.doctor_id) + '</div>'
          + '</div>'
        + '</div>'
      + '</td>'
      + '<td style="font-size:12px;color:var(--text-2);">' + _e(d.specialty || '—') + '</td>'
      + '<td style="font-family:var(--mono);font-size:12px;color:var(--text-2);">' + _e(d.license_no || '—') + '</td>'
      + '<td style="font-family:var(--mono);font-size:12px;">' + _e(_phoneDisplay(d.contact) || '—') + '</td>'
      + '<td style="font-family:var(--mono);font-size:12px;color:var(--text-2);">' + _e(d.username || '—') + '</td>'
      + '<td style="font-size:12px;color:var(--text-2);">'
        + (d.branches_display
          ? '<span>' + _e(d.branches_display) + '</span>'
          : '<span style="color:var(--text-4);">—</span>')
      + '</td>'
      + '<td style="text-align:center;">'
        + '<div style="display:flex;gap:5px;justify-content:center;">'
          + '<button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();dr_openEdit(\'' + _e(d.doctor_id) + '\')" style="padding:5px 10px;" title="Edit">'
            + '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>'
          + '</button>'
          + '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();dr_openDelete(\'' + _e(d.doctor_id) + '\')" style="padding:5px 10px;" title="Delete">'
            + '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>'
          + '</button>'
        + '</div>'
      + '</td>'
      + '</tr>';
  });
  document.getElementById('drTableBody').innerHTML = h; if(typeof _avatarLazyLoad==='function') _avatarLazyLoad();
}

/* ══════════════════════════════════════
   BRANCH PICKER
══════════════════════════════════════ */
function dr_renderBranchPicker(selected) {
  var wrap = document.getElementById('drBranchList');
  if (!wrap) return;
  if (!DR.branches.length) {
    wrap.innerHTML = '<div style="padding:12px;text-align:center;font-size:12px;color:var(--text-4);font-family:var(--mono);">No branches available.</div>';
    return;
  }
  var h = '';
  DR.branches.forEach(function(b) {
    var checked = selected.indexOf(b.branch_id) !== -1;
    h += '<label style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;" onchange="dr_updateBranchCount()">'
      + '<input type="checkbox" value="' + _e(b.branch_id) + '" ' + (checked ? 'checked' : '') + ' style="accent-color:var(--teal-600);width:15px;height:15px;flex-shrink:0;">'
      + '<div>'
        + '<div style="font-size:13px;font-weight:700;color:var(--text-1);">' + _e(b.branch_name) + '</div>'
        + '<div style="font-size:11px;color:var(--text-3);font-family:var(--mono);">' + _e(b.branch_code) + (b.address ? ' · ' + _e(b.address) : '') + '</div>'
      + '</div>'
      + '</label>';
  });
  wrap.innerHTML = h;
  dr_updateBranchCount();
}

function dr_updateBranchCount() {
  var cbs = document.querySelectorAll('#drBranchList input[type=checkbox]:checked');
  var cnt = document.getElementById('drBranchCount');
  if (cnt) cnt.textContent = cbs.length + ' branch' + (cbs.length !== 1 ? 'es' : '') + ' selected';
}

function dr_getSelectedBranches() {
  return Array.from(document.querySelectorAll('#drBranchList input[type=checkbox]:checked')).map(function(cb){ return cb.value; });
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
function dr_openModal() {
  DR.editingId = null;
  document.getElementById('drModalTitle').textContent    = 'Add Doctor';
  document.getElementById('drModalSub').textContent      = 'Fill in doctor details';
  document.getElementById('drSaveBtn').textContent       = 'Save Doctor';
  document.getElementById('drPassReqMark').style.display = 'inline';
  document.getElementById('drPassHint').textContent      = '';
  ['drModalId','drFldLast','drFldFirst','drFldMiddle','drFldSuffix',
   'drFldSpecialty','drFldLicense','drFldContact','drFldEmail','drFldUser','drFldPass']
    .forEach(function(id){ document.getElementById(id).value = ''; });
  dr_renderBranchPicker([]);
  dr_hideModalErr();
  document.getElementById('drModal').style.display = 'flex';
  setTimeout(function(){ document.getElementById('drFldLast').focus(); }, 80);
}

function dr_openEdit(id) {
  var d = DR.all.find(function(x){ return x.doctor_id === id; });
  if (!d) { toast('error', 'Doctor not found.'); return; }
  DR.editingId = id;
  document.getElementById('drModalTitle').textContent    = 'Edit Doctor';
  document.getElementById('drModalSub').textContent      = 'Dr. ' + d.last_name + ', ' + d.first_name;
  document.getElementById('drSaveBtn').textContent       = 'Update Doctor';
  document.getElementById('drPassReqMark').style.display = 'none';
  document.getElementById('drPassHint').textContent      = 'Leave blank to keep existing password';
  document.getElementById('drModalId').value             = d.doctor_id;
  document.getElementById('drFldLast').value             = d.last_name    || '';
  document.getElementById('drFldFirst').value            = d.first_name   || '';
  document.getElementById('drFldMiddle').value           = d.middle_name  || '';
  document.getElementById('drFldSuffix').value           = d.suffix       || '';
  document.getElementById('drFldSpecialty').value        = d.specialty    || '';
  document.getElementById('drFldLicense').value          = d.license_no   || '';
  document.getElementById('drFldContact').value = _phoneDisplay(d.contact);
  document.getElementById('drFldEmail').value            = d.email        || '';
  document.getElementById('drFldUser').value             = d.username     || '';
  document.getElementById('drFldPass').value             = '';
  var assigned = d.branch_ids ? d.branch_ids.split(',').map(function(s){ return s.trim(); }) : [];
  dr_renderBranchPicker(assigned);
  dr_hideModalErr();
  document.getElementById('drModal').style.display = 'flex';
  setTimeout(function(){ document.getElementById('drFldLast').focus(); }, 80);
}

function dr_closeModal() {
  document.getElementById('drModal').style.display = 'none';
  DR.editingId = null;
}
function dr_showModalErr(msg) { var el = document.getElementById('drModalErr'); el.textContent = msg; el.style.display = 'block'; }
function dr_hideModalErr()    { document.getElementById('drModalErr').style.display = 'none'; }

/* ── Save (Optimistic) ── */
function dr_save() {
  var last    = document.getElementById('drFldLast').value.trim();
  var first   = document.getElementById('drFldFirst').value.trim();
  var middle  = document.getElementById('drFldMiddle').value.trim();
  var suffix  = document.getElementById('drFldSuffix').value.trim();
  var spec    = document.getElementById('drFldSpecialty').value.trim();
  var lic     = document.getElementById('drFldLicense').value.trim();
  var contact = _phoneRaw(document.getElementById('drFldContact'));
  var email   = document.getElementById('drFldEmail').value.trim();
  var user    = document.getElementById('drFldUser').value.trim();
  var pass    = document.getElementById('drFldPass').value.trim();
  var isEdit  = !!DR.editingId;
  var branchIds = dr_getSelectedBranches();

  if (!last)               { dr_showModalErr('Last name is required.'); return; }
  if (!first)              { dr_showModalErr('First name is required.'); return; }
  if (!user)               { dr_showModalErr('Username is required.'); return; }
  if (!isEdit && !pass)    { dr_showModalErr('Password is required.'); return; }
  if (!branchIds.length)   { dr_showModalErr('Assign at least one branch.'); return; }
  if (contact && !_phoneValid(contact)) { dr_showModalErr('Invalid contact number. Use 09XXXXXXXXX format.'); return; }

  var branchDisp = branchIds.map(function(bid){
    var b = DR.branches.find(function(x){ return x.branch_id === bid; });
    return b ? b.branch_name : bid;
  }).join(', ');

  var payload = {
    doctor_id: DR.editingId || '', last_name: last, first_name: first,
    middle_name: middle, suffix: suffix, specialty: spec, license_no: lic,
    contact: contact, email: email, username: user, password: pass,
    branch_ids: branchIds.join(',')
  };

  var snapshot = JSON.parse(JSON.stringify(DR.all));

  if (isEdit) {
    var idx = DR.all.findIndex(function(d){ return d.doctor_id === DR.editingId; });
    if (idx !== -1) DR.all[idx] = Object.assign({}, DR.all[idx], {
      last_name: last, first_name: first, middle_name: middle, suffix: suffix,
      specialty: spec, license_no: lic, contact: contact, email: email,
      username: user, branch_ids: branchIds.join(','), branches_display: branchDisp
    });
  } else {
    DR.all.unshift({
      doctor_id: 'DR-PENDING', last_name: last, first_name: first, middle_name: middle,
      suffix: suffix, specialty: spec, license_no: lic, contact: contact, email: email,
      username: user, branch_ids: branchIds.join(','), branches_display: branchDisp
    });
  }

  dr_applyFilter();
  dr_closeModal();
  toast('info', isEdit ? 'Saving changes…' : 'Adding doctor…');

  var fn = isEdit ? 'updateDoctor' : 'createDoctor';
  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) {
        DR.all = snapshot; dr_applyFilter();
        toast('error', r.message || 'Failed.');
        setTimeout(function(){
          if (isEdit) dr_openEdit(payload.doctor_id);
          else        dr_openModal();
          document.getElementById('drFldLast').value    = last;
          document.getElementById('drFldFirst').value   = first;
          document.getElementById('drFldMiddle').value  = middle;
          document.getElementById('drFldSuffix').value  = suffix;
          document.getElementById('drFldSpecialty').value = spec;
          document.getElementById('drFldLicense').value = lic;
          document.getElementById('drFldContact').value = contact;
          document.getElementById('drFldEmail').value   = email;
          document.getElementById('drFldUser').value    = user;
          dr_renderBranchPicker(branchIds);
          dr_showModalErr(r.message || 'Failed.');
        }, 200);
        return;
      }
      if (!isEdit && r.doctor_id) {
        var ti = DR.all.findIndex(function(d){ return d.doctor_id === 'DR-PENDING'; });
        if (ti !== -1) DR.all[ti].doctor_id = r.doctor_id;
        dr_applyFilter();
      }
      toast('success', isEdit ? 'Doctor updated!' : 'Doctor added!');
    })
    .withFailureHandler(function(e) { DR.all = snapshot; dr_applyFilter(); toast('error', e.message || 'Error.'); })
    [fn](payload);
}

/* ── Delete (Optimistic) ── */
function dr_openDelete(id) {
  var d = DR.all.find(function(x){ return x.doctor_id === id; });
  if (!d) return;
  _drDeleteId = id;
  document.getElementById('drDeleteMsg').textContent =
    'Remove Dr. ' + d.last_name + ', ' + d.first_name + '? This cannot be undone.';
  document.getElementById('drDeleteModal').style.display = 'flex';
}
function dr_closeDeleteModal() { document.getElementById('drDeleteModal').style.display = 'none'; _drDeleteId = null; }

function dr_confirmDelete() {
  if (!_drDeleteId) return;
  var id       = _drDeleteId;
  var snapshot = JSON.parse(JSON.stringify(DR.all));
  dr_closeDeleteModal();

  var row = document.getElementById('dr-row-' + id);
  if (row) { row.style.transition = 'opacity .25s,transform .25s'; row.style.opacity = '0'; row.style.transform = 'translateX(8px)'; }
  setTimeout(function(){ DR.all = DR.all.filter(function(d){ return d.doctor_id !== id; }); dr_applyFilter(); }, 260);
  toast('info', 'Removing doctor…');

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) { DR.all = snapshot; dr_applyFilter(); toast('error', r.message || 'Failed.'); return; }
      toast('success', 'Doctor removed.');
    })
    .withFailureHandler(function(e) { DR.all = snapshot; dr_applyFilter(); toast('error', e.message); })
    .deleteDoctor(id);
}

/* ── Profile View ── */
function dr_openProfile(id) {
  var d = DR.all.find(function(x){ return x.doctor_id === id; });
  if (!d) return;
  var fullName = 'Dr. ' + d.last_name + ', ' + d.first_name + (d.middle_name ? ' ' + d.middle_name : '') + (d.suffix ? ' ' + d.suffix : '');
  openProfileModal({
    id:        id,
    name:      fullName,
    role:      'Doctor',
    subtitle:  d.doctor_id,
    photo_url: d.photo_url || '',
    fields: [
      { label: 'Last Name',   value: d.last_name },
      { label: 'First Name',  value: d.first_name },
      { label: 'Middle Name', value: d.middle_name },
      { label: 'Suffix',      value: d.suffix },
      { label: 'Specialty',   value: d.specialty },
      { label: 'License No.', value: d.license_no,  mono: true },
      { label: 'Contact',     value: _phoneDisplay(d.contact),     mono: true },
      { label: 'Email',       value: d.email },
      { label: 'Username',    value: d.username,    mono: true },
      { label: 'Branch(es)',  value: d.branches_display }
    ],
    editFn:   function(i){ dr_openEdit(i); },
    deleteFn: function(i){ dr_openDelete(i); }
  });
}
