<div class="page-view" id="page-liaison-dashboard">
<style>
.lia-hero{background:linear-gradient(135deg,var(--teal-900) 0%,var(--teal-700) 100%);border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:relative;overflow:hidden;}
.lia-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);}
.lia-hero-text{position:relative;z-index:1;}
.lia-hero-greeting{font-size:13px;color:rgba(255,255,255,.65);font-family:var(--mono);margin-bottom:4px;}
.lia-hero-name{font-family:var(--serif);font-size:26px;color:#fff;font-weight:700;line-height:1.15;margin-bottom:6px;}
.lia-hero-date{font-size:12px;color:rgba(255,255,255,.5);font-family:var(--mono);}
.lia-step-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;font-family:var(--mono);}
.lia-step-done{background:rgba(22,163,74,.12);color:#16a34a;}
.lia-step-pending{background:var(--gray-100);color:var(--text-4);}
.lia-order-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s,border-color .15s;}
.lia-order-card:hover{box-shadow:var(--shadow);border-color:var(--teal-400);}
.lia-order-card.selected{border-color:var(--teal-600);box-shadow:0 0 0 2px rgba(0,96,176,.15);}
.lia-checklist-item{border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;background:var(--white);}
.lia-checklist-name{font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:8px;}
.lia-step-row{display:flex;align-items:center;gap:12px;padding:5px 0;}
.lia-step-check{display:flex;align-items:center;gap:6px;cursor:pointer;}
.lia-step-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal-600);cursor:pointer;}
.lia-step-check.disabled{opacity:.4;cursor:not-allowed;}
.lia-step-check.disabled input{cursor:not-allowed;}
.lia-step-label{font-size:12px;font-weight:600;color:var(--text-2);}
.lia-step-time{font-size:10px;color:var(--text-4);font-family:var(--mono);margin-left:auto;}
</style>

<div style="padding:28px 32px;">

  <!-- Hero -->
  <div class="lia-hero">
    <div class="lia-hero-text">
      <div class="lia-hero-greeting" id="liaHeroGreeting">Good morning ☀️</div>
      <div class="lia-hero-name" id="liaHeroName">Welcome back</div>
      <div class="lia-hero-date" id="liaHeroDate"></div>
    </div>
    <div style="position:relative;z-index:1;">
      <button class="btn btn-sm" style="background:#fff;color:var(--teal-800);font-weight:700;" onclick="liaisondash_load()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Refresh Queue
      </button>
    </div>
  </div>

  <!-- Stat row -->
  <div class="stat-grid" style="margin-bottom:20px;" id="liaStatGrid">
    <div class="stat-card"><div class="skeleton" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:32px;width:35%;"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:32px;width:35%;"></div></div>
    <div class="stat-card"><div class="skeleton" style="height:14px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:32px;width:35%;"></div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" id="liaMainGrid">

    <!-- LEFT: Order Queue -->
    <div>
      <div style="font-size:13px;font-weight:800;color:var(--text-1);margin-bottom:10px;">
        Active Orders
        <span style="font-size:11px;font-weight:500;color:var(--text-4);margin-left:6px;">Click an order to manage specimens</span>
      </div>
      <div id="liaQueueList">
        <div style="text-align:center;padding:32px;color:var(--text-4);font-size:13px;">
          <span class="spinner spinner-teal" style="display:inline-block;margin-bottom:8px;"></span><br>Loading queue…
        </div>
      </div>
    </div>

    <!-- RIGHT: Specimen Checklist -->
    <div>
      <div style="font-size:13px;font-weight:800;color:var(--text-1);margin-bottom:10px;" id="liaChecklistTitle">
        Specimen Checklist
        <span style="font-size:11px;font-weight:500;color:var(--text-4);margin-left:6px;">Select an order on the left</span>
      </div>
      <div id="liaChecklist">
        <div style="text-align:center;padding:40px;color:var(--text-4);font-size:13px;border:2px dashed var(--border);border-radius:var(--radius-lg);">
          <div style="font-size:28px;margin-bottom:8px;">🧪</div>
          Select an order to view and manage specimen checklist
        </div>
      </div>
    </div>

  </div>

</div>

<script>
var LIA = {
  branchId: null,
  orders:   [],
  selectedOrderId: null,
  checklistItems: []
};

var LIA_STATUS_COLORS = {
  DRAFT:'#64748b', OPEN:'#ca8a04', PAID:'#16a34a',
  IN_PROGRESS:'#2563eb', FOR_RELEASE:'#7c3aed',
  RELEASED:'#0060b0', CANCELLED:'#dc2626', VOID:'#dc2626'
};

function liaisondash_load() {
  if (!APP.user) return;
  LIA.branchId = APP.user.branch_ids ? APP.user.branch_ids.split(',')[0].trim() : '';
  if (!LIA.branchId) return;

  LIA.selectedOrderId = null;
  lia_resetChecklist();

  document.getElementById('liaQueueList').innerHTML =
    '<div style="text-align:center;padding:32px;color:var(--text-4);font-size:13px;">' +
    '<span class="spinner spinner-teal" style="display:inline-block;margin-bottom:8px;"></span><br>Loading queue…</div>';

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) {
        document.getElementById('liaQueueList').innerHTML =
          '<div style="padding:16px;color:var(--danger);font-size:13px;">' + _e(r.message) + '</div>';
        return;
      }
      // Filter to active orders only (PAID or IN_PROGRESS) AND lab type only
      LIA.orders = (r.data || []).filter(function(o) {
        if (o.status !== 'PAID' && o.status !== 'IN_PROGRESS') return false;
        // Liaison only handles lab orders, not xray
        var types = (o.order_types || 'lab').split(',').map(function(t){ return t.trim(); });
        return types.indexOf('lab') !== -1;
      });
      // Pass only lab orders to stats so counts reflect the liaison's actual queue
      var labOrders = (r.data || []).filter(function(o) {
        var types = (o.order_types || 'lab').split(',').map(function(t){ return t.trim(); });
        return types.indexOf('lab') !== -1;
      });
      lia_renderStats(labOrders);
      lia_renderQueue();
    })
    .withFailureHandler(function(e) {
      document.getElementById('liaQueueList').innerHTML =
        '<div style="padding:16px;color:var(--danger);font-size:13px;">Error: ' + _e(e.message||'') + '</div>';
    })
    .getOrders(LIA.branchId, null);
}

function lia_renderStats(all) {
  var paid    = all.filter(function(o){ return o.status === 'PAID'; }).length;
  var inProg  = all.filter(function(o){ return o.status === 'IN_PROGRESS'; }).length;
  var active  = paid + inProg;
  var cards = [
    { label:'Active Orders',     val: active, icon:'📋', color:'var(--teal-600)' },
    { label:'Awaiting Collection', val: paid,  icon:'🧪', color:'#ca8a04' },
    { label:'In Processing',     val: inProg,  icon:'⚗️', color:'#2563eb' }
  ];
  var h = '';
  cards.forEach(function(c) {
    h += '<div class="stat-card" style="cursor:default;">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">'
        + '<div style="font-size:11px;font-weight:700;color:var(--text-3);">' + c.label + '</div>'
        + '<span style="font-size:18px;">' + c.icon + '</span>'
      + '</div>'
      + '<div style="font-size:28px;font-weight:900;color:var(--text-1);line-height:1;">' + c.val + '</div>'
      + '</div>';
  });
  document.getElementById('liaStatGrid').innerHTML = h;
}

function lia_renderQueue() {
  var container = document.getElementById('liaQueueList');
  if (!LIA.orders.length) {
    container.innerHTML =
      '<div style="text-align:center;padding:32px;color:var(--text-4);font-size:13px;">' +
      '<div style="font-size:28px;margin-bottom:8px;">✅</div>' +
      'No active orders in queue.</div>';
    return;
  }
  var h = '';
  LIA.orders.forEach(function(o) {
    var color   = LIA_STATUS_COLORS[o.status] || '#64748b';
    var label   = (o.status||'').replace(/_/g,' ');
    var selected = o.order_id === LIA.selectedOrderId;
    h += '<div class="lia-order-card' + (selected ? ' selected' : '') + '" onclick="lia_selectOrder(\'' + _e(o.order_id) + '\')">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">'
        + '<span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal-600);">' + _e(o.order_no) + '</span>'
        + '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:' + color + '22;color:' + color + ';font-family:var(--mono);">● ' + label + '</span>'
      + '</div>'
      + '<div style="font-size:13px;font-weight:600;color:var(--text-1);">' + _e(o.patient_name || '—') + '</div>'
      + '<div style="font-size:11px;color:var(--text-4);margin-top:2px;">' + _e(o.order_date||'') + ' · ₱' + Number(o.net_amount||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</div>'
      + '</div>';
  });
  container.innerHTML = h;
}

function lia_selectOrder(orderId) {
  LIA.selectedOrderId = orderId;
  lia_renderQueue(); // re-render to show selected state
  var order = LIA.orders.find(function(o){ return o.order_id === orderId; });
  document.getElementById('liaChecklistTitle').innerHTML =
    'Specimen Checklist'
    + (order ? ' <span style="font-size:11px;font-weight:500;color:var(--text-4);margin-left:6px;">— ' + _e(order.order_no) + ' · ' + _e(order.patient_name||'') + '</span>' : '');

  document.getElementById('liaChecklist').innerHTML =
    '<div style="text-align:center;padding:24px;color:var(--text-4);font-size:12px;font-family:var(--mono);">' +
    '<span class="spinner spinner-teal" style="display:inline-block;margin-bottom:6px;"></span><br>Loading items…</div>';

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) {
        document.getElementById('liaChecklist').innerHTML =
          '<div style="padding:12px;color:var(--danger);font-size:12px;">' + _e(r.message) + '</div>';
        return;
      }
      LIA.checklistItems = r.data || [];
      lia_renderChecklist();
    })
    .withFailureHandler(function(e) {
      document.getElementById('liaChecklist').innerHTML =
        '<div style="padding:12px;color:var(--danger);font-size:12px;">Error: ' + _e(e.message||'') + '</div>';
    })
    .getItemCheckpoints(LIA.branchId, orderId);
}

function lia_renderChecklist() {
  var items = LIA.checklistItems;
  if (!items.length) {
    document.getElementById('liaChecklist').innerHTML =
      '<div style="padding:16px;color:var(--text-4);font-size:13px;">No items found.</div>';
    return;
  }

  var allCollected  = items.every(function(i){ return !!i.collected_at; });
  var allSubmitted  = items.every(function(i){ return !!i.submitted_at; });

  var h = '';
  items.forEach(function(item, idx) {
    var collected = !!item.collected_at;
    var submitted = !!item.submitted_at;
    // submitted requires collected first
    var canSubmit = collected;

    h += '<div class="lia-checklist-item">'
      + '<div class="lia-checklist-name">' + _e(item.lab_name)
        + (item.qty > 1 ? '<span style="font-size:11px;color:var(--text-4);font-weight:400;margin-left:6px;">×' + item.qty + '</span>' : '')
      + '</div>'
      + '<div class="lia-step-row">'

        // Collected step
        + '<label class="lia-step-check" style="' + (!collected && submitted ? 'opacity:.4;' : '') + '">'
          + '<input type="checkbox" ' + (collected ? 'checked' : '') + ' data-idx="' + idx + '" data-step="collected" onchange="lia_onCheck(this)">'
          + '<span class="lia-step-label">🧺 Collected</span>'
        + '</label>'
        + (collected && item.collected_at
            ? '<span class="lia-step-time">' + new Date(item.collected_at).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) + '</span>'
            : '')

        + '<span style="color:var(--border);margin:0 8px;">→</span>'

        // Submitted step
        + '<label class="lia-step-check' + (!canSubmit ? ' disabled' : '') + '">'
          + '<input type="checkbox" ' + (submitted ? 'checked' : '') + ' ' + (!canSubmit ? 'disabled' : '')
          + ' data-idx="' + idx + '" data-step="submitted" onchange="lia_onCheck(this)">'
          + '<span class="lia-step-label">📤 Submitted to MedTech</span>'
        + '</label>'
        + (submitted && item.submitted_at
            ? '<span class="lia-step-time">' + new Date(item.submitted_at).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'}) + '</span>'
            : '')

      + '</div>'
      + '</div>';
  });

  // Summary actions
  h += '<div style="margin-top:12px;padding:10px 0;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;">';
  if (!allCollected) {
    h += '<button class="btn btn-sm btn-secondary" onclick="lia_markAll(\'collected\', true)">Mark All Collected</button>';
  }
  if (allCollected && !allSubmitted) {
    h += '<button class="btn btn-sm btn-primary" onclick="lia_markAll(\'submitted\', true)">Submit All to MedTech</button>';
  }
  if (allSubmitted) {
    h += '<span style="font-size:12px;font-weight:700;color:#16a34a;">✅ All specimens submitted to MedTech</span>';
  }
  h += '</div>';

  document.getElementById('liaChecklist').innerHTML = h;
}

function lia_onCheck(cb) {
  var idx  = parseInt(cb.getAttribute('data-idx'));
  var step = cb.getAttribute('data-step');
  var item = LIA.checklistItems[idx];
  if (!item) return;
  var checked = cb.checked;
  cb.disabled = true;

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success) {
        cb.checked = !checked;
        cb.disabled = false;
        toast('error', r.message || 'Failed to update.');
        return;
      }
      item[step + '_at'] = checked ? new Date().toISOString() : null;
      // Auto-advance order status if started
      if (r.order_status) {
        var o = LIA.orders.find(function(ord){ return ord.order_id === LIA.selectedOrderId; });
        if (o) o.status = r.order_status;
        lia_renderQueue();
      }
      lia_renderChecklist();
    })
    .withFailureHandler(function(e) {
      cb.checked = !checked;
      cb.disabled = false;
      toast('error', e.message || 'Error.');
    })
    .updateItemCheckpoint(LIA.branchId, LIA.selectedOrderId, item.order_item_id, step, checked);
}

function lia_markAll(step, checked) {
  if (!LIA.selectedOrderId || !LIA.checklistItems.length) return;
  // Process sequentially — one call per item
  var items = LIA.checklistItems.filter(function(item) {
    if (step === 'collected') return !item.collected_at;
    if (step === 'submitted') return item.collected_at && !item.submitted_at;
    return false;
  });
  if (!items.length) return;

  toast('info', 'Updating ' + items.length + ' item' + (items.length!==1?'s':'') + '…');

  var done = 0;
  items.forEach(function(item) {
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) {
          item[step + '_at'] = checked ? new Date().toISOString() : null;
          if (r.order_status) {
            var o = LIA.orders.find(function(ord){ return ord.order_id === LIA.selectedOrderId; });
            if (o) o.status = r.order_status;
          }
        }
        done++;
        if (done === items.length) {
          lia_renderQueue();
          lia_renderChecklist();
          toast('success', 'Done — ' + done + ' item' + (done!==1?'s':'') + ' updated.');
        }
      })
      .withFailureHandler(function(){ done++; })
      .updateItemCheckpoint(LIA.branchId, LIA.selectedOrderId, item.order_item_id, step, checked);
  });
}

function lia_resetChecklist() {
  LIA.checklistItems = [];
  document.getElementById('liaChecklistTitle').innerHTML =
    'Specimen Checklist <span style="font-size:11px;font-weight:500;color:var(--text-4);margin-left:6px;">Select an order on the left</span>';
  document.getElementById('liaChecklist').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--text-4);font-size:13px;border:2px dashed var(--border);border-radius:var(--radius-lg);">' +
    '<div style="font-size:28px;margin-bottom:8px;">🧪</div>' +
    'Select an order to view and manage specimen checklist</div>';
}
</script>
</div>
