<div class="page-view" id="page-my-patients">

        <div class="section-header">
          <div>
            <div class="section-title" style="font-size:20px;">My Patients</div>
            <div class="section-sub">Unique patients from your referrals</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="mypat_load()">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="mypatRefreshIcon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
          </button>
        </div>

        <!-- Search -->
        <div style="margin-bottom:16px;">
          <div style="position:relative;max-width:400px;">
            <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-4);" width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
            <input type="text" id="mypatSearch" class="f-inp" style="padding-left:34px;font-size:13px;" placeholder="Search patient name…" oninput="mypat_applyFilter()">
          </div>
        </div>

        <!-- Empty state -->
        <div id="mypatEmptyState" style="display:none;text-align:center;padding:60px 20px;">
          <div style="width:56px;height:56px;border-radius:14px;background:var(--teal-50);border:1.5px solid rgba(0,96,176,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
            <svg width="24" height="24" fill="none" stroke="var(--teal-500)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </div>
          <div style="font-size:14px;font-weight:700;color:var(--text-2);margin-bottom:6px;" id="mypatEmptyTitle">No patients yet</div>
          <div style="font-size:12px;color:var(--text-4);">Patients from your referred orders will appear here.</div>
        </div>

        <!-- Table -->
        <div class="card" id="mypatTableCard" style="display:none;">
          <div style="padding:12px 20px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-3);">
            <span id="mypatCount" style="font-weight:700;color:var(--text-1);">—</span> patients
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Branch</th>
                  <th>Last Order</th>
                  <th>Last Visit</th>
                </tr>
              </thead>
              <tbody id="mypatTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

<script>
var MYPAT = { all:[], filtered:[] };

function mypat_skeleton() {
  var row = '<tr>';
  for (var i=0;i<4;i++) row += '<td><div style="height:13px;border-radius:6px;background:linear-gradient(90deg,#f0f2f7 25%,#e4e8f0 50%,#f0f2f7 75%);background-size:400px 100%;animation:shimmer 1.3s infinite;' + (i===2?'width:130px;':i===3?'width:90px;':'') + '"></div></td>';
  return (row+'</tr>').repeat(5);
}

function mypat_init() {
  MYPAT.all=[]; MYPAT.filtered=[];
  document.getElementById('mypatEmptyState').style.display  = 'none';
  document.getElementById('mypatTableCard').style.display   = '';
  document.getElementById('mypatTableBody').innerHTML       = mypat_skeleton();
  mypat_load();
}

function mypat_load() {
  var doctorId = APP.user ? APP.user.admin_id : '';
  if (!doctorId) return;
  var icon = document.getElementById('mypatRefreshIcon');
  if (icon) icon.style.animation = 'spin .8s linear infinite';
  document.getElementById('mypatTableCard').style.display  = '';
  document.getElementById('mypatTableBody').innerHTML      = mypat_skeleton();
  document.getElementById('mypatEmptyState').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(r) {
      if (icon) icon.style.animation = '';
      if (!r.success) {
        document.getElementById('mypatTableCard').style.display  = 'none';
        document.getElementById('mypatEmptyState').style.display = '';
        document.getElementById('mypatEmptyTitle').textContent   = r.message || 'Error loading patients.';
        return;
      }
      MYPAT.all = r.data || [];
      mypat_applyFilter();
    })
    .withFailureHandler(function(e) {
      if (icon) icon.style.animation = '';
      document.getElementById('mypatTableCard').style.display  = 'none';
      document.getElementById('mypatEmptyState').style.display = '';
      document.getElementById('mypatEmptyTitle').textContent   = e.message || 'Connection error.';
    })
    .getDoctorPatients(doctorId);
}

function mypat_applyFilter() {
  var q = (document.getElementById('mypatSearch').value || '').toLowerCase().trim();
  MYPAT.filtered = MYPAT.all.filter(function(p) {
    if (!q) return true;
    return (p.patient_name + ' ' + p.branch_name).toLowerCase().indexOf(q) !== -1;
  });
  mypat_render();
}

function mypat_render() {
  document.getElementById('mypatCount').textContent = MYPAT.filtered.length;

  if (!MYPAT.filtered.length) {
    document.getElementById('mypatTableCard').style.display  = MYPAT.all.length ? '' : 'none';
    document.getElementById('mypatEmptyState').style.display = MYPAT.all.length ? 'none' : '';
    if (!MYPAT.all.length) {
      document.getElementById('mypatEmptyTitle').textContent = 'No patients yet.';
    } else {
      document.getElementById('mypatTableBody').innerHTML =
        '<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-4);font-size:12px;">No patients match search.</td></tr>';
    }
    return;
  }

  document.getElementById('mypatEmptyState').style.display = 'none';
  document.getElementById('mypatTableCard').style.display  = '';
  document.getElementById('mypatTableBody').innerHTML = MYPAT.filtered.map(function(p) {
    return '<tr>'
      + '<td><span style="font-weight:700;">' + _e(p.patient_name) + '</span><div style="font-size:10px;color:var(--text-4);font-family:var(--mono);">' + _e(p.patient_id) + '</div></td>'
      + '<td style="font-size:12px;color:var(--text-3);">' + _e(p.branch_name) + '</td>'
      + '<td><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal-600);">' + _e(p.last_order) + '</span></td>'
      + '<td style="font-size:12px;color:var(--text-3);font-family:var(--mono);">' + _e(p.last_date) + '</td>'
      + '</tr>';
  }).join('');
}
</script>
