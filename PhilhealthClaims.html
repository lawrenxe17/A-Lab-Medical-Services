<!-- PHILHEALTH CLAIMS -->
      <div class="page-view" id="page-philhealth-claims">

        <div class="section-header">
          <div>
            <div class="section-title" style="font-size:20px;">PhilHealth Claims</div>
            <div class="section-sub">Track and manage PhilHealth benefit claims.</div>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="phc_load()" id="phcRefreshBtn">
            <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="phcRefreshIcon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
          </button>
        </div>

        <!-- SA branch selector -->
        <div id="phcBranchSelector" style="display:none;margin-bottom:16px;">
          <select id="phcBranchSelect" class="f-inp" style="width:auto;min-width:220px;font-size:13px;cursor:pointer;" onchange="phc_onBranchChange()">
            <option value="">— Select a branch —</option>
          </select>
        </div>

        <!-- Stat cards -->
        <div id="phcStatCards" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
          <div class="card" style="padding:16px 20px;">
            <div style="font-size:28px;font-weight:800;color:var(--text-1);" id="phcStatTotal">—</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px;">Total Claims</div>
          </div>
          <div class="card" style="padding:16px 20px;">
            <div style="font-size:28px;font-weight:800;color:#ca8a04;" id="phcStatPending">—</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px;">For Submission</div>
          </div>
          <div class="card" style="padding:16px 20px;">
            <div style="font-size:28px;font-weight:800;color:#2563eb;" id="phcStatFiled">—</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px;">Submitted</div>
          </div>
          <div class="card" style="padding:16px 20px;">
            <div style="font-size:28px;font-weight:800;color:#16a34a;" id="phcStatApproved">—</div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px;">Approved</div>
          </div>
        </div>

        <!-- Filter bar -->
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
          <div style="position:relative;flex:1;min-width:200px;">
            <svg style="position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-4);" width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
            </svg>
            <input type="text" id="phcSearch" class="f-inp" style="padding-left:34px;font-size:13px;" placeholder="Search patient or PIN…" oninput="phc_applyFilter()">
          </div>
          <select id="phcStatusFilter" class="f-inp" style="width:auto;min-width:160px;font-size:13px;cursor:pointer;" onchange="phc_applyFilter()">
            <option value="">All Statuses</option>
            <option value="PENDING">Pending</option>
            <option value="FILED">Filed</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>

        <!-- Empty state -->
        <div id="phcEmptyState" style="display:none;text-align:center;padding:60px 20px;">
          <div style="width:56px;height:56px;border-radius:14px;background:var(--teal-50);border:1.5px solid rgba(0,96,176,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
            <svg width="24" height="24" fill="none" stroke="var(--teal-500)" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
          </div>
          <div style="font-size:14px;font-weight:700;color:var(--text-2);margin-bottom:6px;" id="phcEmptyTitle">No claims found</div>
          <div style="font-size:12px;color:var(--text-4);">PhilHealth claims will appear here when orders are created for PhilHealth members.</div>
        </div>

        <!-- Claims table -->
        <div class="card" id="phcTableCard" style="display:none;">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Order No</th>
                  <th>Patient</th>
                  <th>PhilHealth PIN</th>
                  <th>Amount</th>
                  <th>Year</th>
                  <th>Status</th>
                  <th>Filed At</th>
                </tr>
              </thead>
              <tbody id="phcTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

<script>
/* ════════════════════════════════════
   PHILHEALTH CLAIMS MODULE
════════════════════════════════════ */
var PHC = {
  all:      [],
  filtered: [],
  branchId: null
};

var PHC_STATUS = {
  PENDING:  { bg:'rgba(234,179,8,.12)',  color:'#ca8a04', label:'Pending' },
  FILED:    { bg:'rgba(59,130,246,.1)',  color:'#2563eb', label:'Filed' },
  APPROVED: { bg:'rgba(34,197,94,.1)',   color:'#16a34a', label:'Approved' },
  REJECTED: { bg:'rgba(239,68,68,.1)',   color:'#dc2626', label:'Rejected' }
};

function phc_statusBadge(status) {
  var c = PHC_STATUS[status] || { bg:'var(--gray-100)', color:'var(--text-3)', label: status };
  return '<span style="display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:' + c.bg + ';color:' + c.color + ';">' + c.label + '</span>';
}

function phc_skeleton() {
  var row = '<tr>';
  for (var i=0;i<7;i++) row += '<td><div style="height:13px;border-radius:6px;background:linear-gradient(90deg,#f0f2f7 25%,#e4e8f0 50%,#f0f2f7 75%);background-size:400px 100%;animation:shimmer 1.3s infinite;' + (i===2?'width:130px;':i===3?'width:80px;':i===4?'width:40px;':'') + '"></div></td>';
  return (row+'</tr>').repeat(5);
}

function phc_init() {
  PHC.all      = [];
  PHC.filtered = [];
  PHC.branchId = null;

  var role        = APP.user ? APP.user.role : '';
  var isSA        = role === 'Super Admin';
  var isBA        = role === 'Branch Admin';
  var isTech      = role === 'Technologist';
  var isReception = role === 'Receptionist';

  // Reset stat cards
  ['phcStatTotal','phcStatPending','phcStatFiled','phcStatApproved'].forEach(function(id){
    document.getElementById(id).textContent = '—';
  });

  // SA: show branch selector
  var branchSel = document.getElementById('phcBranchSelector');
  if (branchSel) branchSel.style.display = isSA ? '' : 'none';

  if (isSA) {
    document.getElementById('phcEmptyState').style.display = '';
    document.getElementById('phcEmptyTitle').textContent   = 'Select a branch';
    document.getElementById('phcTableCard').style.display  = 'none';
    // Load branches
    google.script.run
      .withSuccessHandler(function(r) {
        if (!r.success) return;
        var sel = document.getElementById('phcBranchSelect');
        if (!sel) return;
        sel.innerHTML = '<option value="">— Select a branch —</option>';
        (r.data||[]).forEach(function(b) {
          sel.innerHTML += '<option value="' + _e(b.branch_id) + '">' + _e(b.branch_name) + ' (' + _e(b.branch_code) + ')</option>';
        });
      })
      .withFailureHandler(function(){})
      .getBranchesForPatientView('');
  } else if (isBA || isTech || isReception) {
    PHC.branchId = APP.user.branch_ids ? APP.user.branch_ids.split(',')[0].trim() : '';
    if (!PHC.branchId) {
      document.getElementById('phcEmptyState').style.display = '';
      document.getElementById('phcEmptyTitle').textContent   = 'No branch assigned.';
      document.getElementById('phcTableCard').style.display  = 'none';
      return;
    }
    // Show skeleton immediately
    document.getElementById('phcEmptyState').style.display = 'none';
    document.getElementById('phcTableCard').style.display  = '';
    document.getElementById('phcTableBody').innerHTML      = phc_skeleton();
    phc_load();
  }
}

function phc_onBranchChange() {
  var sel = document.getElementById('phcBranchSelect');
  PHC.branchId = sel.value;
  if (!PHC.branchId) {
    document.getElementById('phcEmptyState').style.display = '';
    document.getElementById('phcEmptyTitle').textContent   = 'Select a branch';
    document.getElementById('phcTableCard').style.display  = 'none';
    return;
  }
  document.getElementById('phcEmptyState').style.display = 'none';
  document.getElementById('phcTableCard').style.display  = '';
  document.getElementById('phcTableBody').innerHTML      = phc_skeleton();
  phc_load();
}

function phc_load() {
  if (!PHC.branchId) return;
  var icon = document.getElementById('phcRefreshIcon');
  if (icon) icon.style.animation = 'spin .8s linear infinite';
  document.getElementById('phcTableCard').style.display  = '';
  document.getElementById('phcTableBody').innerHTML      = phc_skeleton();
  document.getElementById('phcEmptyState').style.display = 'none';

  google.script.run
    .withSuccessHandler(function(r) {
      if (icon) icon.style.animation = '';
      if (!r.success) {
        document.getElementById('phcTableCard').style.display  = 'none';
        document.getElementById('phcEmptyState').style.display = '';
        document.getElementById('phcEmptyTitle').textContent   = r.message || 'Error loading claims.';
        return;
      }
      PHC.all = r.data || [];
      phc_applyFilter();
    })
    .withFailureHandler(function(e) {
      if (icon) icon.style.animation = '';
      document.getElementById('phcTableCard').style.display  = 'none';
      document.getElementById('phcEmptyState').style.display = '';
      document.getElementById('phcEmptyTitle').textContent   = e.message || 'Connection error.';
    })
    .getBranchPhilhealthClaims(PHC.branchId);
}

function phc_applyFilter() {
  var q      = (document.getElementById('phcSearch').value || '').toLowerCase().trim();
  var status = document.getElementById('phcStatusFilter').value;
  PHC.filtered = PHC.all.filter(function(c) {
    if (status && c.status !== status) return false;
    if (q) {
      var hay = [c.patient_name, c.philhealth_pin, c.order_no, c.patient_id].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  phc_render();
}

function phc_render() {
  // Update stat cards from full list
  var counts = { PENDING:0, FILED:0, APPROVED:0, REJECTED:0 };
  var totalAmt = 0;
  PHC.all.forEach(function(c) {
    if (counts[c.status] !== undefined) counts[c.status]++;
    totalAmt += c.amount_claimed || 0;
  });
  document.getElementById('phcStatTotal').textContent    = PHC.all.length;
  document.getElementById('phcStatPending').textContent  = counts.PENDING;
  document.getElementById('phcStatFiled').textContent    = counts.FILED;
  document.getElementById('phcStatApproved').textContent = counts.APPROVED;

  if (!PHC.filtered.length) {
    document.getElementById('phcTableCard').style.display  = 'none';
    document.getElementById('phcEmptyState').style.display = '';
    document.getElementById('phcEmptyTitle').textContent   = PHC.all.length ? 'No claims match filter.' : 'No claims found';
    return;
  }

  document.getElementById('phcEmptyState').style.display = 'none';
  document.getElementById('phcTableCard').style.display  = '';

  document.getElementById('phcTableBody').innerHTML = PHC.filtered.map(function(c) {
    var filedAt = c.filed_at
      ? new Date(c.filed_at).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})
      : '—';
    return '<tr>'
      + '<td><span style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--teal-600);">' + _e(c.order_no) + '</span></td>'
      + '<td><span style="font-weight:700;">' + _e(c.patient_name) + '</span></td>'
      + '<td><span style="font-family:var(--mono);font-size:12px;">' + _e(c.philhealth_pin) + '</span></td>'
      + '<td><span style="font-family:var(--mono);font-weight:800;color:var(--teal-600);">₱' + (Number(c.amount_claimed)||0).toLocaleString('en-PH',{minimumFractionDigits:2}) + '</span></td>'
      + '<td style="font-size:12px;color:var(--text-3);">' + _e(c.year) + '</td>'
      + '<td>' + phc_statusBadge(c.status) + '</td>'
      + '<td style="font-size:12px;color:var(--text-3);font-family:var(--mono);">' + filedAt + '</td>'
      + '</tr>';
  }).join('');
}
</script>
