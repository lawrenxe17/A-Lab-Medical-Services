<!-- ══ SETTINGS DROPDOWN (topbar click) ══ -->
<div id="settingsDropdown"
  style="display:none;position:fixed;z-index:600;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:240px;overflow:hidden;">
  <!-- Profile header -->
  <div style="padding:16px 18px;border-bottom:1px solid var(--border);background:var(--gray-50);">
    <div style="display:flex;align-items:center;gap:12px;">
      <div id="sdAvatar"
        style="width:44px;height:44px;border-radius:50%;background:var(--teal-600);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;font-family:var(--mono);flex-shrink:0;cursor:zoom-in;"
        onclick="closeSettingsDropdown();openMyProfile();" title="View my profile">
        SA
      </div>
      <div style="min-width:0;">
        <div id="sdName"
          style="font-size:13px;font-weight:800;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
          Admin</div>
        <div id="sdRole" style="font-size:10px;color:var(--text-3);font-family:var(--mono);margin-top:1px;">Super Admin
        </div>
      </div>
    </div>
  </div>
  <!-- Menu items -->
  <div style="padding:6px;">
    <button onclick="settings_openModal()"
      style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-1);font-family:var(--font);text-align:left;"
      onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='none'">
      <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
      Edit Profile
    </button>
    <button onclick="settings_openModal('password')"
      style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-1);font-family:var(--font);text-align:left;"
      onmouseover="this.style.background='var(--gray-50)'" onmouseout="this.style.background='none'">
      <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
      Change Password
    </button>
    <div style="height:1px;background:var(--border);margin:4px 0;"></div>
    <button onclick="closeSettingsDropdown();doLogout();"
      style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--danger);font-family:var(--font);text-align:left;"
      onmouseover="this.style.background='var(--danger-bg)'" onmouseout="this.style.background='none'">
      <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Sign Out
    </button>
  </div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div id="settingsModal"
  style="display:none;position:fixed;inset:0;z-index:700;background:rgba(9,15,18,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;">
  <div
    style="background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalIn .22s cubic-bezier(.34,1.2,.64,1);">

    <div
      style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-size:16px;font-weight:800;color:var(--text-1);">My Settings</div>
        <div style="font-size:12px;color:var(--text-3);margin-top:2px;font-family:var(--mono);">Update your profile and
          preferences</div>
      </div>
      <button onclick="settings_closeModal()"
        style="width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-3);">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Tab bar -->
    <div id="stgTabBar" style="display:flex;border-bottom:1px solid var(--border);padding:0 24px;gap:0;">
      <button id="stgTabProfile" onclick="stg_switchTab('profile')"
        style="padding:11px 16px;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;border-bottom:2px solid var(--teal-600);color:var(--teal-700);font-family:var(--font);">
        Profile
      </button>
      <button id="stgTabPassword" onclick="stg_switchTab('password')"
        style="padding:11px 16px;font-size:13px;font-weight:700;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-3);font-family:var(--font);"
        onmouseover="if(this.style.borderBottomColor==='transparent')this.style.color='var(--text-1)'" onmouseout="if(this.style.borderBottomColor==='transparent')this.style.color='var(--text-3)'">
        Password
      </button>
    </div>

    <!-- Panel: Profile -->
    <div id="stgPanelProfile" style="padding:24px;display:flex;flex-direction:column;gap:24px;">

      <!-- Avatar section -->
      <div>
        <label class="f-label" style="margin-bottom:10px;display:block;">Profile Photo</label>

        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
          <div style="position:relative;flex-shrink:0;">
            <div id="stgAvatarPreview"
              style="width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;overflow:hidden;border:2px solid var(--border);background:var(--teal-600);color:#fff;font-family:var(--mono);">
            </div>
            <label for="stgPhotoInput"
              style="position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .15s;"
              onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'" title="Upload photo">
              <svg width="18" height="18" fill="none" stroke="white" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </label>
            <input type="file" id="stgPhotoInput" accept="image/jpeg,image/png,image/webp" style="display:none;"
              onchange="stg_onPhotoSelect(this)">
          </div>

          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:var(--text-1);margin-bottom:4px;">Upload a profile photo
            </div>
            <div style="font-size:11px;color:var(--text-4);margin-bottom:10px;">JPG, PNG or WebP · Max 2MB</div>
            <div style="display:flex;gap:6px;">
              <label for="stgPhotoInput" class="btn btn-secondary btn-sm"
                style="cursor:pointer;font-size:12px;padding:6px 12px;">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                </svg>
                Upload Photo
              </label>
              <button type="button" class="btn btn-secondary btn-sm" style="font-size:12px;padding:6px 12px;"
                onclick="stg_removePhoto()">
                <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
                Remove
              </button>
            </div>
          </div>
        </div>

        <div id="stgPhotoStatus" style="display:none;font-size:12px;padding:8px 12px;border-radius:8px;"></div>
      </div>

      <!-- Divider -->
      <div style="height:1px;background:var(--border);"></div>

      <!-- Profile info -->
      <div>
        <label class="f-label" style="margin-bottom:12px;display:block;">Profile Info</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="grid-column:1/-1;">
            <label class="f-label">Display Name</label>
            <input type="text" id="stgFldName" class="f-inp" placeholder="Your display name">
          </div>
          <div style="grid-column:1/-1;">
            <label class="f-label">Email</label>
            <input type="email" id="stgFldEmail" class="f-inp" placeholder="your@email.com">
          </div>
          <div style="grid-column:1/-1;">
            <label class="f-label">Contact</label>
            <input type="tel" id="stgFldContact" class="f-inp" placeholder="09XX XXX XXXX" maxlength="13"
              style="font-family:var(--mono);" oninput="_phoneInput(this)">
            <div class="ph-hint" style="font-size:11px;margin-top:3px;font-family:var(--mono);"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Panel: Password -->
    <div id="stgPanelPassword" style="display:none;padding:24px;flex-direction:column;gap:16px;">
      <label class="f-label" style="margin-bottom:4px;display:block;">Change Password</label>
      <div>
        <label class="f-label">Current Password</label>
        <input type="password" id="stgFldCurPass" class="f-inp" placeholder="Enter current password"
          autocomplete="current-password">
      </div>
      <div>
        <label class="f-label">New Password</label>
        <input type="password" id="stgFldNewPass" class="f-inp" placeholder="Enter new password"
          autocomplete="new-password">
      </div>
      <div>
        <label class="f-label">Confirm New Password</label>
        <input type="password" id="stgFldConfPass" class="f-inp" placeholder="Confirm new password"
          autocomplete="new-password">
      </div>
    </div>


    <div id="stgErr"
      style="display:none;margin:0 24px 16px;font-size:12px;color:var(--danger);background:var(--danger-bg);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:9px 12px;">
    </div>
    <div id="stgSuccess"
      style="display:none;margin:0 24px 16px;font-size:12px;color:var(--success);background:var(--success-bg);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:9px 12px;">
    </div>

    <div style="padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn btn-secondary" onclick="settings_closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="settings_save()">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
        Save Changes
      </button>
    </div>
  </div>
</div>

<!-- ══ PHOTO ZOOM MODAL ══ -->
<div id="photoZoomModal"
  style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;flex-direction:column;gap:18px;"
  onclick="closePhotoZoom()">
  <div style="position:relative;">
    <div id="photoZoomImg"
      style="width:280px;height:280px;border-radius:24px;overflow:hidden;border:3px solid rgba(255,255,255,.12);box-shadow:0 32px 80px rgba(0,0,0,.6);animation:modalIn .22s cubic-bezier(.34,1.2,.64,1);">
    </div>
  </div>
  <div style="text-align:center;animation:modalIn .25s ease;">
    <div id="photoZoomName" style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px;"></div>
    <div id="photoZoomRole" style="font-size:12px;color:rgba(255,255,255,.5);font-family:var(--mono);"></div>
  </div>
  <button onclick="closePhotoZoom()"
    style="position:fixed;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>

<!-- ══ PROFILE VIEW MODAL (Admins / Doctors / Technologists row click) ══ -->
<div id="profileModal"
  style="display:none;position:fixed;inset:0;z-index:500;background:rgba(9,15,18,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;">
  <div
    style="background:var(--white);border-radius:var(--radius-xl);width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:modalIn .22s cubic-bezier(.34,1.2,.64,1);">

    <!-- Hero header with large avatar -->
    <div
      style="position:relative;background:linear-gradient(135deg,var(--teal-900),var(--teal-700));border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:28px 24px 20px;text-align:center;">
      <button onclick="closeProfileModal()"
        style="position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;">
        <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <!-- Large clickable avatar -->
      <div id="profileAvatar" onclick="profileAvatarZoom()"
        style="width:96px;height:96px;border-radius:50%;background:var(--teal-600);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800;color:#fff;font-family:var(--mono);margin:0 auto 14px;border:3px solid rgba(255,255,255,.25);cursor:pointer;transition:transform .15s,box-shadow .15s;overflow:hidden;"
        title="Click to zoom"
        onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.3)'"
        onmouseout="this.style.transform='';this.style.boxShadow=''">SA</div>
      <div id="profileName" style="font-size:18px;font-weight:800;color:#fff;margin-bottom:4px;"></div>
      <div id="profileRole" style="font-size:11px;color:rgba(255,255,255,.55);font-family:var(--mono);"></div>
      <div id="profileId" style="font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;font-family:var(--mono);">
      </div>
    </div>

    <!-- Details grid -->
    <div id="profileBody" style="padding:16px 24px;display:flex;flex-direction:column;gap:0;"></div>

    <!-- Actions -->
    <div style="padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;"
      id="profileActions"></div>
  </div>
</div>

<script>
  /* ════════════════════════════════════
     SETTINGS & PROFILE MODULE
  ════════════════════════════════════ */

  var STG = {
    color: '#0d9090',
    name: '',
    email: '',
    contact: '',
    photoUrl: '',
    photoB64: '',
    activeTab: 'profile'
  };

  /* ── Dropdown ── */
  function toggleSettingsDropdown() {
    var dd = document.getElementById('settingsDropdown');
    if (dd.style.display === 'none' || !dd.style.display) {
      // Position below topbar avatar
      var av = document.getElementById('tbAvatar');
      if (av) {
        var rect = av.getBoundingClientRect();
        dd.style.top = (rect.bottom + 8) + 'px';
        dd.style.right = (window.innerWidth - rect.right) + 'px';
      }
      // Sync dropdown avatar
      var sdAv = document.getElementById('sdAvatar');
      var sdNm = document.getElementById('sdName');
      var sdRl = document.getElementById('sdRole');
      if (sdAv) {
        if (STG.photoUrl) {
          sdAv.innerHTML = '<img src="' + STG.photoUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
          sdAv.style.background = 'transparent';
        } else {
          var initials = APP.user ? (APP.user.name || APP.user.username || 'U').substring(0, 2).toUpperCase() : 'U';
          sdAv.textContent = initials; sdAv.innerHTML = ''; sdAv.textContent = initials;
          sdAv.style.background = STG.color || '#0d9090';
          sdAv.style.fontSize = '';
        }
      }
      if (sdNm) sdNm.textContent = APP.user ? (APP.user.name || APP.user.username) : '';
      if (sdRl) sdRl.textContent = APP.user ? APP.user.role : '';
      dd.style.display = 'block';
    } else {
      dd.style.display = 'none';
    }
  }

  function closeSettingsDropdown() {
    document.getElementById('settingsDropdown').style.display = 'none';
  }

  /* ── Photo upload ── */
  function stg_onPhotoSelect(input) {
    var file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { stg_setPhotoStatus('error', 'File too large. Max 2MB.'); return; }
    if (!file.type.match(/image\/(jpeg|png|webp)/)) { stg_setPhotoStatus('error', 'Only JPG, PNG, or WebP allowed.'); return; }

    var reader = new FileReader();
    reader.onload = function (e) {
      STG.photoB64 = e.target.result; // data:image/...;base64,...
      STG.photoUrl = '';  // clear old URL — will upload on save
      settings_updatePreview();
      stg_setPhotoStatus('info', 'Photo selected. Click Save Changes to upload.');
    };
    reader.readAsDataURL(file);
  }

  function stg_removePhoto() {
    STG.photoUrl = '';
    STG.photoB64 = '';
    var inp = document.getElementById('stgPhotoInput');
    if (inp) inp.value = '';
    stg_setPhotoStatus('', '');
    settings_updatePreview();
  }

  function stg_setPhotoStatus(type, msg) {
    var el = document.getElementById('stgPhotoStatus');
    if (!el) return;
    if (!msg) { el.style.display = 'none'; return; }
    var bg = type === 'error' ? 'var(--danger-bg)' : type === 'success' ? 'var(--success-bg)' : 'rgba(16,168,168,.06)';
    var col = type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--teal-700)';
    var bord = type === 'error' ? 'rgba(239,68,68,.2)' : type === 'success' ? 'rgba(34,197,94,.2)' : 'rgba(16,168,168,.15)';
    el.style.display = 'block';
    el.style.background = bg;
    el.style.color = col;
    el.style.border = '1px solid ' + bord;
    el.textContent = msg;
  }
  function stg_switchTab(tab) {
    STG.activeTab = tab;
    var tabs = ['profile', 'password'];
    tabs.forEach(function(t) {
      var btn = document.getElementById('stgTab' + t.charAt(0).toUpperCase() + t.slice(1));
      var panel = document.getElementById('stgPanel' + t.charAt(0).toUpperCase() + t.slice(1));
      if (!btn || !panel) return;
      var isActive = t === tab;
      btn.style.borderBottomColor = isActive ? 'var(--teal-600)' : 'transparent';
      btn.style.color = isActive ? 'var(--teal-700)' : 'var(--text-3)';
      panel.style.display = isActive ? 'flex' : 'none';
    });
    if (tab === 'password') {
      setTimeout(function() { var el = document.getElementById('stgFldCurPass'); if (el) el.focus(); }, 80);
    }
  }

  function settings_openModal(tab) {
    closeSettingsDropdown();

    // Load saved prefs from sessionStorage
    try {
      var saved = sessionStorage.getItem('alab_prefs_' + (APP.user && APP.user.admin_id || 'guest'));
      if (saved) { var p = JSON.parse(saved); STG.color = p.color || STG.color; STG.contact = p.contact || ''; STG.photoUrl = p.photoUrl || ''; }
    } catch (e) { }

    // Pre-fill fields
    document.getElementById('stgFldName').value = APP.user ? (APP.user.name || APP.user.username || '') : '';
    document.getElementById('stgFldEmail').value = APP.user ? (APP.user.email || '') : '';
    document.getElementById('stgFldContact').value = _phoneDisplay(STG.contact || (APP.user && APP.user.contact));
    document.getElementById('stgFldCurPass').value = '';
    document.getElementById('stgFldNewPass').value = '';
    document.getElementById('stgFldConfPass').value = '';

    STG.photoB64 = '';
    stg_setPhotoStatus('', '');
    var photoInp = document.getElementById('stgPhotoInput');
    if (photoInp) photoInp.value = '';
    settings_updatePreview();
    settings_hideMsg();

    var startTab = tab === 'password' ? 'password' : 'profile';
    stg_switchTab(startTab);

    document.getElementById('settingsModal').style.display = 'flex';
  }

  function settings_closeModal() {
    document.getElementById('settingsModal').style.display = 'none';
  }

  function settings_updatePreview() {
    var prev = document.getElementById('stgAvatarPreview');
    if (!prev) return;
    var src = STG.photoB64 || STG.photoUrl;
    if (src) {
      prev.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
      prev.style.background = 'transparent';
    } else {
      prev.innerHTML = '';
      prev.textContent = APP.user ? (APP.user.name || APP.user.username || 'U').substring(0, 2).toUpperCase() : 'U';
      prev.style.background = STG.color || '#0d9090';
      prev.style.color = '#fff';
    }
  }

  function settings_hideMsg() {
    document.getElementById('stgErr').style.display = 'none';
    document.getElementById('stgSuccess').style.display = 'none';
  }
  function settings_showErr(msg) { var el = document.getElementById('stgErr'); el.textContent = msg; el.style.display = 'block'; document.getElementById('stgSuccess').style.display = 'none'; }
  function settings_showSuccess(msg) { var el = document.getElementById('stgSuccess'); el.textContent = msg; el.style.display = 'block'; document.getElementById('stgErr').style.display = 'none'; }

  function settings_save() {
    var name = document.getElementById('stgFldName').value.trim();
    var email = document.getElementById('stgFldEmail').value.trim();
    var contact = _phoneRaw(document.getElementById('stgFldContact'));
    var curPass = document.getElementById('stgFldCurPass').value.trim();
    var newPass = document.getElementById('stgFldNewPass').value.trim();
    var confPass = document.getElementById('stgFldConfPass').value.trim();

    if (!name) { settings_showErr('Display name is required.'); return; }
    if (contact && !_phoneValid(contact)) { settings_showErr('Invalid contact number. Use 09XXXXXXXXX format.'); return; }

    // Password validation
    var changingPass = curPass || newPass || confPass;
    if (changingPass) {
      if (!curPass) { settings_showErr('Enter your current password to change it.'); return; }
      if (!newPass) { settings_showErr('Enter a new password.'); return; }
      if (newPass !== confPass) { settings_showErr('New passwords do not match.'); return; }
      if (newPass.length < 6) { settings_showErr('Password must be at least 6 characters.'); return; }
    }

    // Save avatar/color/contact to sessionStorage
    STG.contact = contact;

    var doFinalize = function () {
      try {
        sessionStorage.setItem('alab_prefs_' + (APP.user && APP.user.admin_id || 'guest'), JSON.stringify({ color: STG.color, contact: contact, photoUrl: STG.photoUrl }));
      } catch (e) { }
      if (APP.user) { APP.user.name = name; APP.user.email = email; APP.user.contact = contact; try { sessionStorage.setItem('alab_user', JSON.stringify(APP.user)); } catch (e) { } }
      settings_applyAvatar();
      if (changingPass) {
        var payload = { admin_id: APP.user ? APP.user.admin_id : '', role: APP.user ? APP.user.role : '', cur_pass: curPass, new_pass: newPass };
        google.script.run
          .withSuccessHandler(function (r) {
            if (!r.success) { settings_showErr(r.message || 'Failed to update password.'); return; }
            document.getElementById('stgFldCurPass').value = '';
            document.getElementById('stgFldNewPass').value = '';
            document.getElementById('stgFldConfPass').value = '';
            settings_showSuccess('Profile and password updated!');
            toast('success', 'Settings saved.');
          })
          .withFailureHandler(function (e) { settings_showErr(e.message || 'Error.'); })
          .updateMyPassword(payload);
      } else {
        settings_showSuccess('Profile updated!');
        toast('success', 'Settings saved.');
      }
    };

    // Upload photo if pending
    if (STG.photoB64) {
      stg_setPhotoStatus('info', 'Uploading photo…');
      var b64data = STG.photoB64.split(',')[1];
      var mimeType = STG.photoB64.split(';')[0].replace('data:', '');
      var userId = APP.user ? APP.user.admin_id : 'unknown';
      var role = APP.user ? APP.user.role : '';
      google.script.run
        .withSuccessHandler(function (r) {
          if (!r.success) { stg_setPhotoStatus('error', r.message || 'Upload failed.'); return; }
          STG.photoUrl = r.url;
          STG.photoB64 = '';
          settings_updatePreview();
          stg_setPhotoStatus('success', 'Photo uploaded!');
          doFinalize();
        })
        .withFailureHandler(function (e) { stg_setPhotoStatus('error', e.message || 'Upload error.'); })
        .uploadProfilePhoto(b64data, mimeType, userId, role);
    } else {
      doFinalize();
    }
  }

  function settings_applyAvatar() {
    var src = STG.photoUrl;
    var color = STG.color || '#0d9090';

    ['tbAvatar', 'sdAvatar'].forEach(function (id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (src) {
        el.innerHTML = '<img src="' + src + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
        el.style.background = 'transparent';
        el.style.padding = '0';
      } else {
        var initials = APP.user ? (APP.user.name || APP.user.username || 'U').substring(0, 2).toUpperCase() : 'U';
        el.innerHTML = '';
        el.textContent = initials;
        el.style.background = color;
        el.style.fontSize = '';
      }
    });

    var nameDisp = APP.user ? (APP.user.name || APP.user.username) : '';
    ['tbUserName', 'sdName'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.textContent = nameDisp;
    });
  }


  // Called from mountApp after APP.user is set
  function settings_loadPrefs() {
    // Reset STG first so previous user's prefs don't bleed over
    STG.color = '#0d9090';
    STG.contact = '';
    STG.photoUrl = '';
    STG.photoB64 = '';
    try {
      var key = 'alab_prefs_' + (APP.user && APP.user.admin_id || 'guest');
      var saved = sessionStorage.getItem(key);
      if (saved) {
        var p = JSON.parse(saved);
        if (p.color) STG.color = p.color;
        if (p.contact) STG.contact = p.contact;
        if (p.photoUrl) STG.photoUrl = p.photoUrl;
      }
      // If sheet has a photo_url for this user, prefer it over cached sessionStorage
      // (handles case where photo was updated on another device/browser)
      if (APP.user && APP.user.photo_url && !STG.photoUrl) {
        STG.photoUrl = APP.user.photo_url;
      }
    } catch (e) { }
  }

  /* ════════════════════════════════════
     PHOTO ZOOM
  ════════════════════════════════════ */
  var _zoomPhotoUrl = '';
  var _zoomName = '';
  var _zoomRole = '';

  function openPhotoZoom(photoUrl, name, role) {
    _zoomPhotoUrl = photoUrl;
    _zoomName = name;
    _zoomRole = role;
    var imgDiv = document.getElementById('photoZoomImg');
    if (photoUrl) {
      imgDiv.innerHTML = '<img src="' + _e(photoUrl) + '" style="width:100%;height:100%;object-fit:cover;">';
      imgDiv.style.background = 'transparent';
    } else {
      var initials = (name || 'U').trim().split(/\s+/).filter(Boolean);
      var ini = initials.length >= 2 ? (initials[0][0] + initials[initials.length - 1][0]).toUpperCase() : (initials[0] || 'U').substring(0, 2).toUpperCase();
      imgDiv.innerHTML = '';
      imgDiv.style.background = 'var(--teal-600)';
      imgDiv.style.display = 'flex';
      imgDiv.style.alignItems = 'center';
      imgDiv.style.justifyContent = 'center';
      imgDiv.style.fontSize = '80px';
      imgDiv.style.fontWeight = '800';
      imgDiv.style.color = '#fff';
      imgDiv.style.borderRadius = '24px';
      imgDiv.textContent = ini;
    }
    document.getElementById('photoZoomName').textContent = name || '';
    document.getElementById('photoZoomRole').textContent = role || '';
    document.getElementById('photoZoomModal').style.display = 'flex';
  }

  function closePhotoZoom() {
    document.getElementById('photoZoomModal').style.display = 'none';
  }

  // View own profile photo (topbar avatar click)
  function openMyProfile() {
    if (!APP.user) return;
    var photoUrl = STG.photoUrl || (APP.user.photo_url || '');
    var name = APP.user.name || APP.user.username || '';
    var role = APP.user.role || '';
    openPhotoZoom(photoUrl, name, role);
  }

  // Called when clicking avatar inside profile modal
  function profileAvatarZoom() {
    closeProfileModal();
    openPhotoZoom(_zoomPhotoUrl, _zoomName, _zoomRole);
  }
  var _profileEditFn = null;
  var _profileDeleteFn = null;
  var _profileId = null;
  var _profileModule = null;

  function openProfileModal(opts) {
    // Store for zoom
    _zoomPhotoUrl = opts.photo_url || '';
    _zoomName = opts.name || '';
    _zoomRole = opts.role || '';

    var parts = (opts.name || 'U').trim().split(/\s+/).filter(Boolean);
    var ini = parts.length >= 2 ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase() : (parts[0] || 'U').substring(0, 2).toUpperCase();
    var avEl = document.getElementById('profileAvatar');

    if (opts.photo_url) {
      avEl.innerHTML = '<img src="' + _e(opts.photo_url) + '" style="width:100%;height:100%;object-fit:cover;">';
      avEl.style.background = 'rgba(255,255,255,.1)';
      avEl.style.fontSize = '';
    } else {
      avEl.innerHTML = '';
      avEl.textContent = ini;
      avEl.style.background = 'rgba(255,255,255,.15)';
      avEl.style.fontSize = '34px';
    }

    document.getElementById('profileName').textContent = opts.name || '—';
    document.getElementById('profileRole').textContent = opts.role || '—';
    document.getElementById('profileId').textContent = opts.subtitle || '';

    // Build fields
    var body = document.getElementById('profileBody');
    body.innerHTML = opts.fields.map(function (f) {
      return '<div style="display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);">'
        + '<div style="font-size:12px;color:var(--text-3);font-weight:600;min-width:110px;flex-shrink:0;padding-top:1px;">' + _e(f.label) + '</div>'
        + '<div style="font-size:13px;color:var(--text-1);font-weight:' + (f.mono ? '500' : '600') + ';font-family:' + (f.mono ? 'var(--mono)' : 'var(--font)') + ';word-break:break-word;">' + (f.value ? _e(String(f.value)) : '<span style="color:var(--text-4);">—</span>') + '</div>'
        + '</div>';
    }).join('');

    // Actions
    _profileEditFn = opts.editFn || null;
    _profileDeleteFn = opts.deleteFn || null;
    _profileId = opts.id || null;

    var actDiv = document.getElementById('profileActions');
    actDiv.innerHTML = '';
    if (opts.deleteFn) {
      var delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm';
      delBtn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Delete';
      delBtn.onclick = function () { closeProfileModal(); opts.deleteFn(opts.id); };
      actDiv.appendChild(delBtn);
    }
    if (opts.editFn) {
      var editBtn = document.createElement('button');
      editBtn.className = 'btn btn-primary btn-sm';
      editBtn.innerHTML = '<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg> Edit';
      editBtn.onclick = function () { closeProfileModal(); opts.editFn(opts.id); };
      actDiv.appendChild(editBtn);
    }
    if (!opts.editFn && !opts.deleteFn) {
      actDiv.innerHTML = '<span style="font-size:12px;color:var(--text-4);">View only</span>';
    }

    document.getElementById('profileModal').style.display = 'flex';
  }

  function closeProfileModal() {
    document.getElementById('profileModal').style.display = 'none';
  }
