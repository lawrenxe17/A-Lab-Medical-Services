<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal-950:#000d2e;--teal-900:#001a5c;--teal-800:#002d8a;--teal-700:#004099;
  --teal-600:#0060b0;--teal-500:#0078c8;--teal-400:#0090d8;--teal-300:#40aaee;
  --teal-200:#80ccf4;--teal-100:#c0e4fa;--teal-50:#e8f4fd;
  --gray-900:#111820;--gray-800:#1c2633;--gray-700:#263040;--gray-600:#3a4558;
  --gray-500:#5a6a80;--gray-400:#8090a8;--gray-300:#b0bece;--gray-200:#d4dde8;
  --gray-100:#eef2f7;--gray-50:#f6f9fc;--white:#ffffff;
  --bg:var(--gray-50);--surface:var(--white);--surface2:var(--gray-100);
  --border:var(--gray-200);--border2:#c8d4e0;
  --text-1:var(--gray-900);--text-2:var(--gray-600);--text-3:var(--gray-400);--text-4:var(--gray-300);
  --success:#10b981;--success-bg:#ecfdf5;--warning:#f59e0b;--warning-bg:#fffbeb;
  --danger:#ef4444;--danger-bg:#fef2f2;--info:#3b82f6;--info-bg:#eff6ff;
  --sidebar-w:256px;--sidebar-collapsed:68px;--topbar-h:60px;
  --radius:10px;--radius-lg:16px;--radius-xl:22px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);
  --shadow-xl:0 24px 64px rgba(0,0,0,.14),0 8px 24px rgba(0,0,0,.08);
  --font:'Geist',sans-serif;--mono:'Geist Mono',monospace;--serif:'DM Serif Display',serif;
}

html,body{font-family:var(--font);background:var(--bg);color:var(--text-1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-400)}

/* ── VIEW TRANSITIONS ── */
.view{position:fixed;inset:0;will-change:opacity,transform;transition:opacity .3s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1);}
.view.hidden{opacity:0;pointer-events:none;transform:translateY(10px);}
.view.visible{opacity:1;pointer-events:all;transform:translateY(0);}

/* ── LOGIN ── */
#viewLogin{display:flex;align-items:stretch;background:var(--white);z-index:200;overflow:hidden;}
.login-brand{flex:0 0 420px;background:linear-gradient(160deg,var(--teal-900) 0%,var(--teal-700) 60%,var(--teal-600) 100%);display:flex;flex-direction:column;justify-content:space-between;padding:48px 44px;position:relative;overflow:hidden;}
.login-brand::before{content:'';position:absolute;top:-80px;right:-80px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(0,198,198,.18) 0%,transparent 70%);pointer-events:none;}
.login-brand::after{content:'';position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none;}
.brand-grid{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.08) 1px,transparent 1px);background-size:32px 32px;}
.brand-logo{position:relative;z-index:1;}
.brand-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:32px;}
.brand-icon{width:44px;height:44px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.brand-name{font-family:var(--serif);font-size:28px;color:rgba(255,255,255,.95);letter-spacing:-.01em;}
.brand-tagline{font-size:13px;color:rgba(255,255,255,.75);font-weight:400;line-height:1.7;max-width:300px;}
.brand-features{position:relative;z-index:1;}
.brand-feat-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.brand-feat-item:last-child{border-bottom:none;}
.brand-feat-dot{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-feat-dot svg{color:rgba(255,255,255,.95);}
.brand-feat-text{font-size:12px;color:rgba(255,255,255,.75);font-weight:500;}
.brand-feat-label{font-size:13px;font-weight:700;color:#fff;}
.brand-footer{position:relative;z-index:1;font-size:11px;color:rgba(255,255,255,.4);font-family:var(--mono);}
.login-form-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;background:var(--white);overflow-y:auto;}
.login-form-inner{width:100%;max-width:380px;}
.login-form-logo{display:flex;align-items:center;gap:8px;margin-bottom:32px;}
.login-form-icon{width:38px;height:38px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;}
.login-form-brand{font-family:var(--serif);font-size:22px;color:var(--teal-800);}
.login-h{font-size:26px;font-weight:800;color:var(--text-1);margin-bottom:4px;letter-spacing:-.02em;}
.login-sub{font-size:13px;color:var(--text-3);margin-bottom:32px;}
.login-err{display:none;font-size:12px;color:var(--danger);font-weight:600;background:var(--danger-bg);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:9px 12px;margin-bottom:14px;}
.login-err.show{display:flex;align-items:center;gap:7px;}
.btn-signin{width:100%;padding:13px;border:none;border-radius:var(--radius);background:var(--teal-600);color:var(--white);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;letter-spacing:.01em;transition:background .15s,box-shadow .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-signin:hover{background:var(--teal-700);box-shadow:0 4px 16px rgba(0,96,176,.25);}
.btn-signin:active{transform:scale(.99);}
.btn-signin:disabled{opacity:.6;cursor:default;transform:none;box-shadow:none;}
.login-footer{margin-top:28px;font-size:11px;color:var(--text-4);text-align:center;font-family:var(--mono);}
@media(max-width:820px){.login-brand{display:none;}.login-form-panel{padding:32px 24px;}}

/* ── APP SHELL ── */
#viewApp{display:flex;background:var(--bg);z-index:100;height:100%;overflow:hidden;}

/* Sidebar */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--gray-900);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;transition:width .25s cubic-bezier(.4,0,.2,1),transform .25s cubic-bezier(.4,0,.2,1);z-index:80;overflow:hidden;box-shadow:2px 0 20px rgba(0,0,0,.15);}
.sidebar.collapsed{width:var(--sidebar-collapsed);}
.sb-header{height:var(--topbar-h);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-logo{display:flex;align-items:center;gap:10px;flex:1;min-width:0;text-decoration:none;}
.sb-logo-icon{width:34px;height:34px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-text{white-space:nowrap;overflow:hidden;transition:opacity .2s,max-width .25s;max-width:200px;}
.sidebar.collapsed .sb-logo-text{opacity:0;max-width:0;}
.sb-logo-name{font-family:var(--serif);font-size:20px;color:rgba(255,255,255,.95);line-height:1;}
.sb-logo-sub{font-size:9px;color:var(--teal-400);font-family:var(--mono);letter-spacing:.08em;margin-top:1px;}
.sb-user{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:var(--teal-700);border:2px solid var(--teal-500);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--teal-200);flex-shrink:0;font-family:var(--mono);}
.sb-user-info{min-width:0;transition:opacity .2s,max-width .25s;white-space:nowrap;overflow:hidden;max-width:200px;}
.sidebar.collapsed .sb-user-info{opacity:0;max-width:0;}
.sb-user-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);}
.sb-user-role{font-size:10px;color:var(--teal-400);font-family:var(--mono);}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;}
.sb-section{margin-bottom:4px;}
.sb-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);padding:6px 8px 4px;white-space:nowrap;transition:opacity .15s;}
.sidebar.collapsed .sb-section-label{opacity:0;}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;text-decoration:none;color:rgba(255,255,255,.55);transition:background .12s,color .12s;margin-bottom:1px;position:relative;white-space:nowrap;font-size:13px;font-weight:500;}
.sb-nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9);}
.sb-nav-item.active{background:rgba(0,96,176,.15);color:var(--teal-300);}
.sb-nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--teal-400);border-radius:0 3px 3px 0;}
.sb-nav-icon{width:18px;height:18px;flex-shrink:0;}
.sb-nav-label{transition:opacity .2s,max-width .25s;overflow:hidden;max-width:200px;}
.sidebar.collapsed .sb-nav-label{opacity:0;max-width:0;width:0;}
.sidebar.collapsed .sb-nav-item{justify-content:center;gap:0;padding:9px 0;}
.sidebar.collapsed .sb-nav-item::after{content:attr(data-label);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:var(--gray-800);color:rgba(255,255,255,.9);font-size:12px;font-weight:600;padding:5px 10px;border-radius:7px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200;box-shadow:var(--shadow);}
.sidebar.collapsed .sb-nav-item:hover::after{opacity:1;}
.sidebar.collapsed .sb-nav-item.active::before{display:none;}
.sb-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.sb-logout{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.4);background:none;border:none;font-family:var(--font);font-size:13px;font-weight:500;width:100%;transition:background .12s,color .12s;white-space:nowrap;}
.sb-logout:hover{background:rgba(239,68,68,.1);color:#ff7b7b;}
.sidebar.collapsed .sb-logout{justify-content:center;gap:0;padding:9px 0;}
.sidebar.collapsed .sb-logout .sb-logout-label{opacity:0;max-width:0;width:0;overflow:hidden;}

/* Topbar */
.topbar{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;z-index:70;transition:left .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 0 var(--border),0 4px 8px rgba(0,0,0,.03);}
.sidebar.collapsed~.app-body .topbar{left:var(--sidebar-collapsed);}
.topbar-breadcrumb{flex:1;min-width:0;}
.tb-page{font-size:16px;font-weight:800;color:var(--text-1);letter-spacing:-.01em;}
.tb-path{font-size:11px;color:var(--text-3);margin-top:1px;font-family:var(--mono);}
.tb-actions{display:flex;align-items:center;gap:10px;}
.tb-divider{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.tb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 8px;border-radius:9px;transition:background .15s;}
.tb-user:hover{background:var(--gray-50);}
.tb-user-av{width:32px;height:32px;border-radius:50%;background:var(--teal-600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--white);font-family:var(--mono);flex-shrink:0;}
.tb-user-info{display:flex;flex-direction:column;}
.tb-user-name{font-size:13px;font-weight:700;color:var(--text-1);}
.tb-user-role{font-size:10px;color:var(--text-3);font-family:var(--mono);}
.sb-mobile-toggle{display:none;width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);color:var(--text-2);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;}
.tb-sidebar-toggle{display:flex;width:36px;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);color:var(--text-3);cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s,border-color .15s;}
.tb-sidebar-toggle:hover{background:var(--gray-50);border-color:var(--border2);color:var(--text-1);}
@media(max-width:768px){
  .sb-mobile-toggle{display:flex;}
  .tb-sidebar-toggle{display:none;}
  .sidebar{transform:translateX(-100%);width:var(--sidebar-w)!important;}
  .sidebar.mobile-open{transform:translateX(0);}
  .topbar{left:0!important;padding:0 12px;}
  .tb-user-name,.tb-user-role{display:none;}
  .app-body{margin-left:0!important;}
  .app-main{padding:16px 12px 60px;}
  .section-header{gap:8px;}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .dash-hero{flex-direction:column;align-items:flex-start;padding:20px 18px;gap:14px;}
  .dash-hero-right{width:100%;flex-direction:row;}
  .dash-hero-name{font-size:20px;}
  .card-header{padding:12px 14px;}
  .card-body{padding:14px;}
  .table th,.table td{padding:8px 10px;font-size:11px;}
  .btn-sm{padding:5px 10px;font-size:11px;}
}
@media(max-width:400px){
  .stat-grid{grid-template-columns:1fr;}
  .dash-hero-right{flex-direction:column;}
}
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:79;
  backdrop-filter:blur(3px);
}
.sidebar.mobile-open~* .sb-overlay,
.sb-overlay.open{display:block;}

/* App body & main */
.app-body{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;transition:margin-left .25s cubic-bezier(.4,0,.2,1);height:100%;overflow:hidden;}
.sidebar.collapsed~.app-body{margin-left:var(--sidebar-collapsed);}
.app-main{margin-top:var(--topbar-h);flex:1;padding:28px 28px 48px;overflow-y:auto;overflow-x:hidden;height:calc(100% - var(--topbar-h));}
.page-view{display:none;}
.page-view.active{display:block;animation:pageFadeIn .22s ease;}
@keyframes pageFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── COMPONENTS ── */
.f-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-2);margin-bottom:6px;}
.f-wrap{margin-bottom:16px;position:relative;}
.f-inp{width:100%;background:var(--gray-50);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:14px;font-family:var(--font);color:var(--text-1);outline:none;transition:border-color .15s,box-shadow .15s,background .15s;}
.f-inp:focus{background:var(--white);border-color:var(--teal-500);box-shadow:0 0 0 3px rgba(0,96,176,.1);}
.f-inp::placeholder{color:var(--text-4);}
.f-inp-icon{padding-left:40px;}
.f-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius);border:none;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--teal-600);color:var(--white);}
.btn-primary:hover{background:var(--teal-700);box-shadow:0 4px 14px rgba(0,96,176,.2);}
.btn-secondary{background:var(--gray-100);color:var(--text-2);border:1.5px solid var(--border);}
.btn-secondary:hover{background:var(--gray-50);border-color:var(--border2);}
.btn-danger{background:var(--danger-bg);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:var(--white);}
.btn-sm{padding:6px 13px;font-size:12px;}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;}

.badge{display:inline-flex;align-items:center;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-teal{background:rgba(0,96,176,.1);color:var(--teal-700);}
.badge-green{background:var(--success-bg);color:var(--success);}
.badge-warn{background:var(--warning-bg);color:var(--warning);}
.badge-red{background:var(--danger-bg);color:var(--danger);}
.badge-gray{background:var(--gray-100);color:var(--text-3);}
.badge-blue{background:var(--info-bg);color:var(--info);}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;}
.card-body{padding:20px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);background:var(--gray-50);}
/* table-wrap inside card gets its own scroll context */
.card .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;border-radius:0 0 var(--radius-lg) var(--radius-lg);}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.section-title{font-size:15px;font-weight:800;color:var(--text-1);letter-spacing:-.01em;}
.section-sub{font-size:12px;color:var(--text-3);margin-top:2px;}

.table-wrap{overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;width:100%;position:relative;}
.table{width:100%;border-collapse:collapse;min-width:480px;}
.table th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);background:var(--gray-50);border-bottom:1.5px solid var(--border);white-space:nowrap;}
.table td{padding:10px 14px;font-size:13px;color:var(--text-2);border-bottom:1px solid var(--gray-100);vertical-align:middle;}
.table tbody tr:hover td{background:var(--gray-50);}
.table tbody tr:last-child td{border-bottom:none;}

.static-placeholder{background:var(--white);border:1.5px dashed var(--border2);border-radius:var(--radius-lg);padding:60px 40px;text-align:center;}
.static-placeholder-icon{width:56px;height:56px;border-radius:14px;background:var(--teal-50);border:1.5px solid rgba(0,96,176,.2);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;}
.static-placeholder h3{font-size:16px;font-weight:800;color:var(--text-1);margin-bottom:6px;}
.static-placeholder p{font-size:13px;color:var(--text-3);max-width:340px;margin:0 auto;}
.static-badge{display:inline-flex;align-items:center;gap:5px;background:var(--teal-50);border:1px solid rgba(0,96,176,.2);color:var(--teal-700);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:14px;font-family:var(--mono);}

.divider{height:1px;background:var(--border);margin:20px 0;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr;}}
@media(max-width:1100px){.grid-3{grid-template-columns:1fr 1fr;}}

/* ── LOADERS ── */
#appLoader{position:fixed;inset:0;background:var(--white);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.loader-mark{width:52px;height:52px;background:var(--teal-600);border-radius:16px;display:flex;align-items:center;justify-content:center;animation:loaderPulse 2s ease-in-out infinite;}
@keyframes loaderPulse{0%,100%{box-shadow:0 0 0 0 rgba(13,144,144,.3)}50%{box-shadow:0 0 0 14px rgba(13,144,144,0)}}
.loader-bar{width:200px;height:3px;background:var(--gray-100);border-radius:3px;overflow:hidden;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--teal-600),var(--teal-400));border-radius:3px;animation:loadSlide 1.4s ease-in-out infinite;}
@keyframes loadSlide{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.loader-text{font-size:12px;color:var(--text-3);font-family:var(--mono);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:rgba(255,255,255,.9);animation:spin .75s linear infinite;}
.spinner-teal{border-color:rgba(0,96,176,.2);border-top-color:var(--teal-600);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;align-items:center;gap:9px;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:var(--font);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;transform:translateY(8px);}
#toast.show{opacity:1;transform:translateY(0);}
#toast.t-success{background:#fff;border:1.5px solid #a7f3d0;color:var(--success);}
#toast.t-error  {background:#fff;border:1.5px solid #fca5a5;color:var(--danger);}
#toast.t-info   {background:#fff;border:1.5px solid #93c5fd;color:var(--info);}

/* ── MODAL ── */
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideup{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── DASHBOARD ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.stat-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.stat-card-accent{position:absolute;top:0;right:0;width:80px;height:80px;border-radius:0 0 0 80px;opacity:.08;}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;flex-shrink:0;}
.stat-val{font-size:28px;font-weight:800;color:var(--text-1);line-height:1;letter-spacing:-.02em;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--text-3);font-weight:500;}
.stat-delta{display:inline-flex;align-items:center;gap:3px;margin-top:8px;font-size:11px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:20px;}
.delta-up{background:#ecfdf5;color:#059669;}
.delta-down{background:var(--danger-bg);color:var(--danger);}
.delta-neutral{background:var(--gray-100);color:var(--text-3);}
.dash-hero{background:linear-gradient(135deg,var(--teal-900) 0%,var(--teal-700) 100%);border-radius:var(--radius-xl);padding:28px 32px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:20px;position:relative;overflow:hidden;}
.dash-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(0,198,198,.18) 0%,transparent 70%);pointer-events:none;}
.dash-hero-grid{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.dash-hero-text{position:relative;z-index:1;}
.dash-hero-greeting{font-size:12px;color:rgba(255,255,255,.5);font-family:var(--mono);margin-bottom:6px;}
.dash-hero-name{font-family:var(--serif);font-size:26px;color:rgba(255,255,255,.95);margin-bottom:6px;}
.dash-hero-sub{font-size:13px;color:rgba(255,255,255,.55);max-width:360px;line-height:1.6;}
.dash-hero-right{position:relative;z-index:1;display:flex;gap:10px;flex-wrap:wrap;}
.dash-hero-btn{padding:9px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;}
.dash-hero-btn-primary{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.2);}
.dash-hero-btn-primary:hover{background:rgba(255,255,255,.22);}
.dash-hero-btn-secondary{background:var(--teal-400);color:var(--teal-950);}
.dash-hero-btn-secondary:hover{background:var(--teal-300);}
.status-pill{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;}
.status-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.s-pending{background:#fffbeb;color:#b45309;}
.s-processing{background:#eff6ff;color:#1d4ed8;}
.s-completed{background:#ecfdf5;color:#059669;}
.s-cancelled{background:#fef2f2;color:#b91c1c;}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
.activity-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.act-text{font-size:13px;color:var(--text-2);line-height:1.5;flex:1;}
.act-text strong{color:var(--text-1);font-weight:700;}
.act-time{font-size:10px;color:var(--text-4);font-family:var(--mono);white-space:nowrap;margin-top:2px;}
.qs-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
.qs-item{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;}
.qs-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qs-val{font-size:20px;font-weight:800;color:var(--text-1);line-height:1;}
.qs-label{font-size:11px;color:var(--text-3);margin-top:2px;}
</style>
